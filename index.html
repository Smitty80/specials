<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>J. Patrick Marketing  </title>
<script src="https://cdn.tailwindcss.com"></script>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap" rel="stylesheet">
<style>
body { font-family: 'Inter', sans-serif; }

<body class="text-gray-800 bg-white">

<!-- NAVIGATION -->
<header class="shadow bg-white sticky top-0 z-50">
  <div class="max-w-7xl mx-auto flex justify-between items-center p-4">
    <h1 class="text-xl font-bold flex items-center">
      J. Patrick Marketing&nbsp;&nbsp;&nbsp;
      <img src="logo.png" alt="Logo" class="max-h-12 w-auto">
    </h1>


 
  </div>
</header>


<!-- HEADLINE MESSAGE -->
<section class="bg-blue-100 py-20">
<!-- <section class="bg-gray-100 py-28"> -->
  <div class="max-w-6xl mx-auto text-center px-6">
    <h2 class="text-4xl md:text-5xl font-bold mb-6">Offering Special Purchase Opportunities for Selected Clients</h2>
    <p class="text-lg text-gray-600 mb-10">Enter promotional code for limited time offers.</p>
 
<div class="container">
    <!--  <h3>Enter your code below to find your special deal.</h3> -->
    <input type="text" id="userInput" placeholder="Your Code Goes Here">
    <button onclick="checkCode()">CLICK HERE to see your special offer.</button>
    <p id="message"></p>
</div>

<script>
    function checkCode() {
        // 1. LIST OF VALID CODES
        const validCodes = ["CODE123", "SECRET99", "OPENZONE", "ALPHA5"];
        
        // 2. GET USER INPUT
        const input = document.getElementById("userInput").value;
        const message = document.getElementById("message");

        // 3. COMPARE AND REDIRECT
        if (validCodes.includes(input)) {
            message.style.color = "green";
            message.innerHTML = "Code accepted! Redirecting...";
            
            // Redirect to a new page
            window.location.href = "success.html"; // <-- CHANGE THIS URL
        } else {
            message.style.color = "red";
            message.innerHTML = "Invalid log in ID. Please try again.";
        }
    }
</script>
 </div>
</section>

<!-- CODE TO CONTROL BUTTON OPERATION -->
<script>
  const btn = document.getElementById('menu-btn');
  const menu = document.getElementById('menu');

  btn.addEventListener('click', () => {
    // This toggles between hidden and flex when you click the button
    menu.classList.toggle('hidden');
    menu.classList.toggle('flex');
  });
